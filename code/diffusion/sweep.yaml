command:
  - ${env}
  - python3
  - train_sr3.py
  - ${args}

method: bayes

metric:
  name: val/psnr_x0
  goal: maximize

parameters:

  # ----------------- core training setup -----------------
  batch_size:
    distribution: int_uniform
    min: 4
    max: 16

  epochs:
    distribution: int_uniform
    min: 150
    max: 400

  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 5e-4

  weight_decay:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-3

  timesteps:
    distribution: categorical
    values: [500, 1000]

  hidden_dim:
    distribution: categorical
    values: [32, 48]

  accumulation_steps:
    distribution: categorical
    values: [2, 4]

  grad_clip:
    distribution: uniform
    min: 0.5
    max: 2.0

  # ----------------- data-related -----------------
  sample_fraction:
    distribution: uniform
    min: 0.1
    max: 0.5

  # ----------------- loss & weighting -----------------
  gauss_sigma:
    distribution: uniform
    min: 0.4
    max: 0.9

  lambda_x0:
    distribution: log_uniform_values
    min: 3e-2       # 0.03
    max: 3e-1       # 0.3

  lambda_perceptual:
    distribution: log_uniform_values
    min: 1e-5
    max: 3e-4

  # ----------------- sampling / viz -----------------
  inference_steps:
    distribution: categorical
    values: [100]

  init_sigma:
    distribution: uniform
    min: 0.5
    max: 1.5

# No early termination → runs complete all epochs
run_cap: 50
