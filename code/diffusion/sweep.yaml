command:
  - ${env}
  - python3
  - train_sr3.py
  - ${args}

method: bayes

metric:
  name: val/psnr_x0
  goal: maximize

parameters:
  batch_size:
    distribution: int_uniform
    min: 4
    max: 16
    # Note: With accumulation_steps=4, effective batch size will be 16-64

  epochs:
    distribution: int_uniform
    min: 100
    max: 500

  learning_rate:
    distribution: log_uniform
    min: 1e-5
    max: 1e-3

  weight_decay:
    distribution: log_uniform
    min: 1e-6
    max: 1e-2

  timesteps:
    distribution: categorical
    values: [500, 1000]
    # Common choices: 500 (faster), 1000 (standard)

  hidden_dim:
    distribution: categorical
    values: [32, 48, 64]
    # Reduced from original since we're using smaller batch sizes

  gauss_sigma:
    distribution: uniform
    min: 0.2
    max: 0.6
    # Controls Gaussian weight map spread for epsilon loss

  lambda_perceptual:
    distribution: log_uniform
    min: 1e-5
    max: 1e-2
    # Weight for VGG perceptual loss on x0_pred

  accumulation_steps:
    distribution: categorical
    values: [2, 4, 8]
    # Gradient accumulation to maintain effective batch size

  grad_clip:
    distribution: uniform
    min: 0.5
    max: 2.0
    # Gradient clipping to prevent exploding gradients

  ema_decay:
    distribution: uniform
    min: 0.999
    max: 0.9999
    # Exponential moving average decay for model weights

  early_stop_patience:
    distribution: categorical
    values: [10, 15, 20]
    # Early stopping patience

  early_stop_min_delta:
    distribution: log_uniform
    min: 1e-5
    max: 1e-3
    # Minimum improvement to reset early stopping counter

  inference_steps:
    distribution: categorical
    values: [50, 100, 250]
    # Sampling steps for visualization (faster = lower quality)

early_terminate:
  type: hyperband
  min_iter: 10
  max_iter: 50

run_cap: 50
