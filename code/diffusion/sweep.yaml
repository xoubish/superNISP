command:
  - ${env}
  - python3
  - train.py
  - ${args}

method: bayes

metric:
  name: psnr
  goal: maximize

parameters:
  activation_function:
    distribution: categorical
    values: [ReLU, LeakyReLU, ELU]

  batch_size:
    distribution: int_uniform
    min: 8
    max: 64

  epochs:
    distribution: int_uniform
    min: 50
    max: 500

  learning_rate:
    distribution: log_uniform
    min: 0.00001
    max: 0.001

  optimizer:
    distribution: categorical
    values: [Adam, AdamW]

  timesteps:
    distribution: int_uniform
    min: 250
    max: 1000

  weight_decay:
    distribution: log_uniform
    min: 0.00001
    max: 0.01

  hidden_dim:
    distribution: categorical
    values: [32, 64, 96, 128]

  mse_weight:
    distribution: uniform
    min: 0.1
    max: 2.0

  l1_weight:
    distribution: uniform
    min: 0.0
    max: 0.2

  perceptual_weight:
    distribution: log_uniform
    min: 0.0001
    max: 0.2

  shape_weight:
    distribution: uniform
    min: 0.0
    max: 0.5

early_terminate: 
  type: hyperband
  min_iter: 10

run_cap: 100
