command:
  - ${env}
  - python3
  - train.py
  - ${args}

method: bayes

metric:
  name: psnr
  goal: maximize

parameters:
  activation_function:
    distribution: categorical
    values: [ReLU, LeakyReLU, ELU]

  batch_size:
    distribution: int_uniform
    min: 8
    max: 64

  epochs:
    distribution: int_uniform
    min: 50
    max: 300

  learning_rate:
    distribution: log_uniform
    min: 0.0001
    max: 0.005

  optimizer:
    distribution: categorical
    values: [Adam, AdamW]

  timesteps:
    distribution: int_uniform
    min: 400
    max: 600

  weight_decay:
    distribution: log_uniform
    min: 0.00001
    max: 0.01

  hidden_dim:
    distribution: categorical
    values: [64, 96, 128]

  mse_weight:
    distribution: uniform
    min: 0.7
    max: 1.5

  l1_weight:
    distribution: uniform
    min: 0.0
    max: 0.3

  perceptual_weight:
    distribution: log_uniform
    min: 0.0001
    max: 0.3

  shape_weight:
    distribution: uniform
    min: 0.0
    max: 0.3

early_terminate: 
  type: hyperband
  min_iter: 10

run_cap: 100
