command:
  - ${env}
  - python3
  - train.py
  - ${args}

method: bayes

metric:
  name: val_loss
  goal: minimize

parameters:
  activation_function:
    distribution: categorical
    values: [ReLU, LeakyReLU, ELU]

  batch_size:
    distribution: int_uniform
    min: 16
    max: 128

  epochs:
    distribution: int_uniform
    min: 50
    max: 300

  learning_rate:
    distribution: uniform
    min: 5e-05
    max: 0.0006

  timesteps:
    distribution: int_uniform
    min: 250
    max: 1000

  inference_timesteps:
    distribution: int_uniform
    min: 20
    max: 100

  weight_decay:
    distribution: uniform
    min: 0.0001
    max: 0.01

  mse_weight:
    distribution: uniform
    min: 0.1
    max: 2.0

  l1_weight:
    distribution: uniform
    min: 0.0
    max: 0.2

  perceptual_weight:
    distribution: uniform
    min: 0.0
    max: 0.1

  shape_weight:
    distribution: uniform
    min: 0.05
    max: 0.3

  hybrid_loss_weight:
    distribution: uniform
    min: 0.1
    max: 2.0

  direct_recon_weight:
    distribution: uniform
    min: 0.05
    max: 0.5

  weight_sigma:
    distribution: uniform
    min: 0.2
    max: 0.6

  grad_clip:
    distribution: uniform
    min: 0.5
    max: 2.0

  warmup_epochs:
    distribution: int_uniform
    min: 0
    max: 10

  ema_decay:
    distribution: uniform
    min: 0.999
    max: 0.9999

  early_stop_patience:
    distribution: int_uniform
    min: 20
    max: 40

  early_stop_min_delta:
    distribution: uniform
    min: 0.0001
    max: 0.0005

program: train.py

run_cap: 100
